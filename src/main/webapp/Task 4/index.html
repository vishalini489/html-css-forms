<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task 4 – Date &amp; Time Inputs</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="card">
    <div class="card-header">
        <span class="tag">Task 4</span>
        <h1>Date &amp; Time Inputs</h1>
    </div>
    <form>
        <div class="field">
            <label for="t-date">Date</label>
            <input type="date" id="t-date" name="t-date" />
        </div>
        <div class="field">
            <label for="t-time">Time</label>
            <input type="time" id="t-time" name="t-time" />
        </div>
        <div class="field">
            <label for="t-dt">Date &amp; Time</label>
            <input type="datetime-local" id="t-dt" name="t-dt" />
        </div>
        <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
