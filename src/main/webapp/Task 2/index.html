<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task 2 – Explore Input Types</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="card">
    <div class="card-header">
        <span class="tag">Task 2</span>
        <h1>Explore Input Types</h1>
    </div>
    <form>
        <div class="field">
            <label for="t-text">Text</label>
            <input type="text" id="t-text" name="t-text" placeholder="Enter text" />
        </div>
        <div class="field">
            <label for="t-pass">Password</label>
            <input type="password" id="t-pass" name="t-pass" placeholder="Enter password" />
        </div>
        <div class="field">
            <label for="t-email">Email</label>
            <input type="email" id="t-email" name="t-email" placeholder="name@example.com" />
        </div>
        <div class="field">
            <label for="t-num">Number</label>
            <input type="number" id="t-num" name="t-num" placeholder="Enter number" />
        </div>
        <div class="field">
            <label for="t-tel">Telephone</label>
            <input type="tel" id="t-tel" name="t-tel" placeholder="Enter phone number" />
        </div>
        <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
